services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-grocery_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-grocerymate_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grocery_user} -d ${POSTGRES_DB:-grocerymate_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-grocery_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-grocerymate_db}
      POSTGRES_HOST: db
      POSTGRES_URI: postgresql://${POSTGRES_USER:-grocery_user}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-grocerymate_db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change_this_in_production}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - frontend_build:/app/frontend/build
      - backend_logs:/app/backend/logs

volumes:
  postgres_data:
  frontend_build:
  backend_logs:
